<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Субботник жизни — Хронология</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1e2e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* Шапка */
    .header {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      padding: 20px;
      z-index: 100;
      border-bottom: 1px solid rgba(167, 243, 208, 0.2);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #a7f3d0 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Карточка статуса */
    .status-card {
      background: rgba(30, 30, 46, 0.8);
      border-radius: 16px;
      padding: 20px;
      margin: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .status-item {
      text-align: center;
    }

    .status-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .status-value {
      font-size: 24px;
      font-weight: 700;
    }

    .status-value.profit {
      color: #10b981;
    }

    .status-value.missed {
      color: #f87171;
    }

    /* Лента времени */
    .timeline {
      position: relative;
      padding: 20px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 30px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #a7f3d0 0%, #c4b5fd 100%);
      opacity: 0.3;
    }

    /* Карточка события */
    .event-card {
      position: relative;
      background: rgba(30, 30, 46, 0.8);
      border-radius: 16px;
      padding: 20px;
      margin-left: 50px;
      margin-bottom: 20px;
      border: 1px solid rgba(167, 243, 208, 0.1);
      transition: all 0.3s ease;
    }

    .event-card:hover {
      border-color: rgba(167, 243, 208, 0.3);
      transform: translateX(4px);
    }

    .event-card::before {
      content: '';
      position: absolute;
      left: -30px;
      top: 24px;
      width: 12px;
      height: 12px;
      background: #a7f3d0;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(167, 243, 208, 0.6);
    }

    .event-date {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .event-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .event-desc {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .event-finance {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .event-finance.income {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .event-finance.expense {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
    }

    /* Медиа в карточке */
    .event-media {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .event-media img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s ease;
      border: 2px solid rgba(167, 243, 208, 0.3);
    }

    .event-media img:hover {
      transform: scale(1.05);
    }

    /* FAB кнопка */
    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      transition: all 0.3s ease;
      z-index: 99;
      border: none;
      color: #0f172a;
    }

    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(16, 185, 129, 0.6);
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e1e2e;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    /* Форма */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(167, 243, 208, 0.2);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #a7f3d0;
      background: rgba(15, 23, 42, 1);
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%);
      border: none;
      border-radius: 12px;
      color: #0f172a;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: rgba(167, 243, 208, 0.1);
      border: 1px solid rgba(167, 243, 208, 0.3);
      border-radius: 12px;
      color: #a7f3d0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(167, 243, 208, 0.2);
    }

    /* Переключатель типа операции */
    .toggle-container {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid rgba(167, 243, 208, 0.3);
      background: rgba(15, 23, 42, 0.6);
      color: #94a3b8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-btn.active[data-type="income"] {
      background: rgba(16, 185, 129, 0.2);
      border-color: #10b981;
      color: #10b981;
    }

    .toggle-btn.active[data-type="expense"] {
      background: rgba(248, 113, 113, 0.2);
      border-color: #f87171;
      color: #f87171;
    }

    .toggle-btn.active[data-type="skip"] {
      background: rgba(148, 163, 184, 0.2);
      border-color: #94a3b8;
      color: #94a3b8;
    }

    .toggle-btn:hover:not(.active) {
      border-color: rgba(167, 243, 208, 0.5);
      color: #e2e8f0;
    }

    /* Поле прибыли с динамическим цветом */
    #financeInput {
      transition: all 0.3s ease;
    }

    #financeInput.income {
      border-color: #10b981;
      color: #10b981;
    }

    #financeInput.income::placeholder {
      color: rgba(16, 185, 129, 0.5);
    }

    #financeInput.expense {
      border-color: #f87171;
      color: #f87171;
    }

    #financeInput.expense::placeholder {
      color: rgba(248, 113, 113, 0.5);
    }

    #financeInput.skip {
      border-color: #94a3b8;
      color: #94a3b8;
      opacity: 0.5;
    }

    /* Превью медиа в форме */
    .media-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .media-preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #a7f3d0;
    }

    /* Пустое состояние */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- Шапка -->
  <div class="header">
    <h1> Субботник жизни</h1>
  </div>

  <!-- Карточка статуса -->
  <div class="status-card">
    <div class="status-item">
      <div class="status-label">Прибыль</div>
      <div class="status-value profit" id="totalProfit">0 ₽</div>
    </div>
    <div class="status-item">
      <div class="status-label">Упущено</div>
      <div class="status-value missed" id="totalMissed">0 ₽</div>
    </div>
  </div>

  <!-- Лента времени -->
  <div class="timeline" id="timeline">
    <!-- События будут здесь -->
  </div>

  <!-- FAB кнопка -->
  <button class="fab" onclick="openModal()">+</button>

  <!-- Модальное окно -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Новое событие</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>

      <form id="eventForm">
        <div class="form-group">
          <label>Дата и время</label>
          <input type="datetime-local" id="dateInput" required>
        </div>

        <div class="form-group">
          <label>Название</label>
          <input type="text" id="titleInput" placeholder="Например: Пик продаж" required>
        </div>

        <div class="form-group">
          <label>Описание</label>
          <textarea id="descInput" placeholder="Что произошло?"></textarea>
        </div>

        <!-- Переключатель типа операции -->
        <div class="form-group">
          <label>Тип операции</label>
          <div class="toggle-container">
            <button type="button" class="toggle-btn active" data-type="income" onclick="setFinanceType('income')">
              + Доход
            </button>
            <button type="button" class="toggle-btn" data-type="expense" onclick="setFinanceType('expense')">
              − Расход
            </button>
            <button type="button" class="toggle-btn" data-type="skip" onclick="setFinanceType('skip')">
              Пропустить
            </button>
          </div>
          <input type="hidden" id="financeType" value="income">
        </div>

        <div class="form-group">
          <label>Сумма (₽)</label>
          <input type="number" id="financeInput" placeholder="18800" class="income">
        </div>

        <div class="form-group">
          <label for="mediaInput">📷 Фото (необязательно)</label>
          <input 
            type="file" 
            id="mediaInput" 
            accept="image/*" 
            multiple
            style="display: none;"
          >
          <button 
            type="button" 
            onclick="document.getElementById('mediaInput').click()"
            class="btn-secondary"
          >
            Выбрать фото
          </button>
          <div id="mediaPreview" class="media-preview"></div>
        </div>

        <button type="submit" class="btn-primary">Сохранить</button>
      </form>
    </div>
  </div>

  <script>
    // Временное хранилище для медиа
    window.tempMedia = [];

    // Загрузка событий из LocalStorage
    function loadEvents() {
      return JSON.parse(localStorage.getItem('sz_timeline_events') || '[]');
    }

    // Сохранение событий в LocalStorage
    function saveEvents(events) {
      localStorage.setItem('sz_timeline_events', JSON.stringify(events));
    }

    // Форматирование даты
    function formatDate(dateString) {
      const date = new Date(dateString);
      const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 
                      'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
      const day = date.getDate();
      const month = months[date.getMonth()];
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${day} ${month} • ${hours}:${minutes}`;
    }

    // Обновление карточки статуса
    function updateStatus() {
      const events = loadEvents();
      let profit = 0;
      let missed = 0;

      events.forEach(event => {
        if (!event.finance) return;
        
        // Убираем знак + если есть, парсим число
        const value = parseFloat(String(event.finance).replace('+', ''));
        
        if (value > 0) {
          profit += value;
        } else if (value < 0) {
          missed += Math.abs(value);
        }
      });

      document.getElementById('totalProfit').textContent = `${profit.toLocaleString('ru-RU')} ₽`;
      document.getElementById('totalMissed').textContent = `${missed.toLocaleString('ru-RU')} ₽`;
    }

    // Рендер событий
    function renderEvents() {
      const events = loadEvents();
      const timeline = document.getElementById('timeline');

      if (events.length === 0) {
        timeline.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">Пока нет событий</div>
          </div>
        `;
        updateStatus();
        return;
      }

      // Сортировка по дате (новые сверху)
      events.sort((a, b) => b.sortDate - a.sortDate);

      timeline.innerHTML = events.map(event => {
        // Медиа
        const mediaHtml = event.media && event.media.length > 0 
          ? `<div class="event-media">
               ${event.media.map(src => `<img src="${src}" alt="event photo" onclick="viewImage('${src}')"`).join('')}
             </div>`
          : '';

        // Финансы с цветовой индикацией
        let financeHtml = '';
        if (event.finance) {
          const financeClass = event.finance.startsWith('-') ? 'expense' : 'income';
          financeHtml = `<div class="event-finance ${financeClass}">${event.finance} ₽</div>`;
        }

        return `
          <div class="event-card">
            <div class="event-date">${event.date}</div>
            <div class="event-title">${event.title}</div>
            <div class="event-desc">${event.desc || ''}</div>
            ${financeHtml}
            ${mediaHtml}
          </div>
        `;
      }).join('');

      updateStatus();
    }

    // Открыть модальное окно
    function openModal() {
      document.getElementById('modal').classList.add('active');
      document.getElementById('dateInput').value = new Date().toISOString().slice(0, 16);
      // Сброс переключателя на "Доход"
      setFinanceType('income');
    }

    // Закрыть модальное окно
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('eventForm').reset();
      document.getElementById('mediaPreview').innerHTML = '';
      window.tempMedia = [];
      setFinanceType('income');
    }

    // Переключение типа операции (Доход/Расход/Пропустить)
    function setFinanceType(type) {
      // Сохраняем выбранный тип
      document.getElementById('financeType').value = type;
      
      // Убираем active у всех кнопок
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      
      // Добавляем active нажатой кнопке
      document.querySelector(`[data-type="${type}"]`).classList.add('active');
      
      // Получаем поле ввода
      const financeInput = document.getElementById('financeInput');
      
      // Меняем стили и placeholder в зависимости от типа
      financeInput.classList.remove('income', 'expense', 'skip');
      
      if (type === 'income') {
        financeInput.classList.add('income');
        financeInput.placeholder = '18800';
        financeInput.disabled = false;
      } else if (type === 'expense') {
        financeInput.classList.add('expense');
        financeInput.placeholder = '3000';
        financeInput.disabled = false;
      } else if (type === 'skip') {
        financeInput.classList.add('skip');
        financeInput.placeholder = 'Не указано';
        financeInput.disabled = true;
        financeInput.value = '';
      }
      
      // Фокус на поле если не skip
      if (type !== 'skip') {
        setTimeout(() => financeInput.focus(), 100);
      }
    }

    // Конвертация файла в base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Обработка загрузки фото
    document.getElementById('mediaInput')?.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      const mediaArray = [];

      for (const file of files) {
        const base64 = await fileToBase64(file);
        mediaArray.push(base64);
      }

      // Показать превью в форме
      const preview = document.getElementById('mediaPreview');
      preview.innerHTML = mediaArray.map(src => 
        `<img src="${src}" alt="preview">`
      ).join('');

      // Сохранить во временную переменную
      window.tempMedia = mediaArray;
    });

    // Обработка формы
    document.getElementById('eventForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const dateValue = document.getElementById('dateInput').value;
      const financeType = document.getElementById('financeType').value;
      let financeValue = document.getElementById('financeInput').value;

      // Добавляем знак + или - в зависимости от типа
      if (financeType === 'expense' && financeValue) {
        financeValue = '-' + Math.abs(parseFloat(financeValue));
      } else if (financeType === 'income' && financeValue) {
        financeValue = '+' + Math.abs(parseFloat(financeValue));
      } else if (financeType === 'skip') {
        financeValue = '';
      }

      const event = {
        date: formatDate(dateValue),
        title: document.getElementById('titleInput').value,
        desc: document.getElementById('descInput').value,
        finance: financeValue,
        sortDate: new Date(dateValue).getTime(),
        media: window.tempMedia || []
      };

      const events = loadEvents();
      events.push(event);
      saveEvents(events);

      closeModal();
      renderEvents();
    });

    // Просмотр изображения
    function viewImage(src) {
      const img = new Image();
      img.src = src;
      img.style.cssText = 'max-width: 100%; max-height: 100%; border-radius: 12px;';
      
      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 300;
        cursor: pointer;
        padding: 20px;
      `;
      
      overlay.appendChild(img);
      overlay.onclick = () => overlay.remove();
      document.body.appendChild(overlay);
    }

    // Закрытие модального окна по клику вне контента
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        closeModal();
      }
    });

    // Инициализация
    renderEvents();
  </script>
</body>
</html>
