<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Субботник жизни — Хронология</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1e2e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    .header {
      position: sticky; top: 0; background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px); padding: 16px 20px; z-index: 100;
      border-bottom: 1px solid rgba(167, 243, 208, 0.2);
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header h1 {
      font-size: 20px; font-weight: 600;
      background: linear-gradient(135deg, #a7f3d0 0%, #c4b5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-actions { display: flex; gap: 8px; }
    
    .mode-toggle {
      padding: 6px 12px; background: rgba(196, 181, 253, 0.2); border: 1px solid #c4b5fd;
      color: #c4b5fd; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .mode-toggle.view-mode { background: rgba(148, 163, 184, 0.2); border-color: #94a3b8; color: #94a3b8; }
    .settings-btn { background: none; border: none; font-size: 24px; cursor: pointer; opacity: 0.7; }

    .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 16px; background: rgba(167, 243, 208, 0.1); border: 1px solid rgba(167, 243, 208, 0.3);
      border-radius: 20px; color: #94a3b8; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
    }
    .filter-btn.active { background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%); border-color: #10b981; color: #0f172a; font-weight: 600; }

    .projects-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; padding: 20px;
    }
    .project-card {
      background: rgba(30, 30, 46, 0.8); border: 1px solid rgba(167, 243, 208, 0.1);
      border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.3s ease;
      position: relative; display: flex; flex-direction: column; justify-content: space-between;
      min-height: 140px;
    }
    .project-card:hover { border-color: rgba(167, 243, 208, 0.3); transform: translateY(-2px); }
    .project-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #e2e8f0; }
    .project-meta { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .project-finance { font-size: 14px; font-weight: 600; margin-top: 8px; }
    .project-finance.income { color: #10b981; }
    .project-finance.expense { color: #f87171; }
    
    .card-actions {
      position: absolute; top: 8px; right: 8px; display: flex; gap: 6px;
    }
    .action-btn {
      background: rgba(167, 243, 208, 0.1); border: 1px solid rgba(167, 243, 208, 0.3);
      border-radius: 6px; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px; transition: all 0.3s ease;
    }
    .action-btn.delete { background: rgba(248, 113, 113, 0.1); border-color: rgba(248, 113, 113, 0.3); color: #f87171; }
    .action-btn.edit { color: #a7f3d0; }
    .action-btn:hover { transform: scale(1.1); }

    .timeline-view { display: none; padding: 20px; }
    .back-btn {
      background: none; border: none; color: #a7f3d0; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .timeline { position: relative; }
    .timeline::before {
      content: ''; position: absolute; left: 20px; top: 0; bottom: 0;
      width: 2px; background: linear-gradient(180deg, #a7f3d0 0%, #c4b5fd 100%); opacity: 0.3;
    }
    .event-card {
      position: relative; background: rgba(30, 30, 46, 0.8); border-radius: 16px;
      padding: 16px; margin-left: 40px; margin-bottom: 16px; border: 1px solid rgba(167, 243, 208, 0.1);
    }
    .event-card::before {
      content: ''; position: absolute; left: -26px; top: 20px; width: 10px; height: 10px;
      background: #a7f3d0; border-radius: 50%; box-shadow: 0 0 12px rgba(167, 243, 208, 0.6);
    }
    .event-date { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .event-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #e2e8f0; padding-right: 70px; }
    .event-desc { font-size: 14px; color: #94a3b8; margin-bottom: 8px; line-height: 1.4; }
    .event-finance { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .event-finance.income { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .event-finance.expense { background: rgba(248, 113, 113, 0.2); color: #f87171; }
    .event-media { display: flex; gap: 8px; margin-top: 8px; overflow-x: auto; }
    .event-media img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(167, 243, 208, 0.3); }

    .fab {
      position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
      background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
      cursor: pointer; box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4); z-index: 99; border: none; color: #0f172a;
    }
    .fab.hidden { opacity: 0; pointer-events: none; transform: scale(0.5); }

    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7); z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e1e2e; border-radius: 24px 24px 0 0; width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto; padding: 24px; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 20px; font-weight: 600; }
    .modal-close { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(167, 243, 208, 0.2); border-radius: 12px; color: #e2e8f0; font-size: 16px;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    
    .btn-primary {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%);
      border: none; border-radius: 12px; color: #0f172a; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
    }
    .btn-secondary {
      width: 100%; padding: 12px; background: rgba(167, 243, 208, 0.1);
      border: 1px solid rgba(167, 243, 208, 0.3); border-radius: 12px; color: #a7f3d0; font-size: 14px; cursor: pointer; margin-bottom: 12px;
    }
    .btn-danger {
      width: 100%; padding: 12px; background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3); border-radius: 12px; color: #f87171; font-size: 14px; cursor: pointer;
    }

    .toggle-container { display: flex; gap: 8px; margin-bottom: 12px; }
    .toggle-btn {
      flex: 1; padding: 10px; border: 2px solid rgba(167, 243, 208, 0.3);
      background: rgba(15, 23, 42, 0.6); color: #94a3b8; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .toggle-btn.active[data-type="income"] { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #10b981; }
    .toggle-btn.active[data-type="expense"] { background: rgba(248, 113, 113, 0.2); border-color: #f87171; color: #f87171; }
    .toggle-btn.active[data-type="skip"] { background: rgba(148, 163, 184, 0.2); border-color: #94a3b8; color: #94a3b8; }

    .media-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .media-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #a7f3d0; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
  </style>
</head>
<body>

  <div id="main-view">
    <div class="header">
      <div class="header-top">
        <h1>🌿 СЖ: Проекты</h1>
        <div class="header-actions">
          <button class="mode-toggle" id="modeToggle" onclick="toggleEditMode()">✏️ Ред.</button>
          <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="filterProjects('all', this)">Все</button>
        <button class="filter-btn" onclick="filterProjects('Бизнес', this)"> Бизнес</button>
        <button class="filter-btn" onclick="filterProjects('Проект СЖ', this)">🚀 СЖ</button>
        <button class="filter-btn" onclick="filterProjects('Личное', this)">🏠 Личное</button>
        <button class="filter-btn" onclick="filterProjects('Другое', this)">📌 Другое</button>
      </div>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>

  <div id="project-view" class="timeline-view">
    <div class="header" style="position: relative; border-bottom: none; padding-bottom: 0;">
      <button class="back-btn" onclick="goBack()">← Назад к проектам</button>
    </div>
    <h2 id="projectTitle" style="padding: 0 20px 20px; font-size: 24px;"></h2>
    <div class="timeline" id="timeline"></div>
  </div>

  <button class="fab" id="fabBtn" onclick="handleFabClick()">+</button>

  <!-- Модалка проекта -->
  <div class="modal" id="projectModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="projectModalTitle">Новый проект</div>
        <button class="modal-close" onclick="closeModal('projectModal')">×</button>
      </div>
      <form id="projectForm">
        <input type="hidden" id="projId">
        <div class="form-group">
          <label>Название</label>
          <input type="text" id="projTitle" placeholder="Например: Сабантуй" required>
        </div>
        <div class="form-group">
          <label>Категория</label>
          <select id="projCategory" required>
            <option value="Бизнес"> Бизнес</option>
            <option value="Проект СЖ">🚀 Проект СЖ</option>
            <option value="Личное">🏠 Личное</option>
            <option value="Другое">📌 Другое</option>
          </select>
        </div>
        <div class="form-group">
          <label>Подкатегория</label>
          <input type="text" id="projSubcategory" placeholder="Например: Сезонки" required>
        </div>
        <div class="form-group">
          <label>Краткое описание</label>
          <textarea id="projSummary" placeholder="О чем этот проект?"></textarea>
        </div>
        <button type="submit" class="btn-primary" id="projSubmitBtn">Создать проект</button>
      </form>
    </div>
  </div>

  <!-- Модалка события -->
  <div class="modal" id="eventModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="eventModalTitle">Новое событие</div>
        <button class="modal-close" onclick="closeModal('eventModal')">×</button>
      </div>
      <form id="eventForm">
        <input type="hidden" id="eventId">
        <div class="form-group">
          <label>Дата и время</label>
          <input type="datetime-local" id="eventDate" required>
        </div>
        <div class="form-group">
          <label>Название</label>
          <input type="text" id="eventTitle" placeholder="Что произошло?" required>
        </div>
        <div class="form-group">
          <label>Описание</label>
          <textarea id="eventDesc" placeholder="Детали..."></textarea>
        </div>
        <div class="form-group">
          <label>Тип операции</label>
          <div class="toggle-container">
            <button type="button" class="toggle-btn active" data-type="income" onclick="setFinanceType('income')">+ Доход</button>
            <button type="button" class="toggle-btn" data-type="expense" onclick="setFinanceType('expense')">− Расход</button>
            <button type="button" class="toggle-btn" data-type="skip" onclick="setFinanceType('skip')">Пропустить</button>
          </div>
          <input type="hidden" id="financeType" value="income">
        </div>
        <div class="form-group">
          <label>Сумма (₽)</label>
          <input type="number" id="financeInput" placeholder="18800" class="income">
        </div>
        <div class="form-group">
          <label>📷 Фото</label>
          <input type="file" id="mediaInput" accept="image/*" multiple style="display: none;">
          <button type="button" onclick="document.getElementById('mediaInput').click()" class="btn-secondary">Выбрать фото</button>
          <div id="mediaPreview" class="media-preview"></div>
        </div>
        <button type="submit" class="btn-primary" id="eventSubmitBtn">Сохранить событие</button>
      </form>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">⚙️ Настройки</div>
        <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
      </div>
      <div class="form-group">
        <label>Массовый импорт</label>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 12px;">Загрузи готовую структуру проектов из JSON.</p>
        <input type="file" id="importInput" accept=".json" style="display: none;" onchange="importData(event)">
        <button onclick="document.getElementById('importInput').click()" class="btn-primary">📤 Загрузить JSON</button>
      </div>
      <div class="form-group">
        <label>Экспорт данных</label>
        <button onclick="exportData()" class="btn-secondary">📥 Скачать бэкап</button>
      </div>
      <div class="form-group" style="margin-top: 30px;">
        <button onclick="clearData()" class="btn-danger">️ Очистить все данные</button>
      </div>
    </div>
  </div>

  <script>
    window.tempMedia = [];
    window.currentFilter = 'all';
    window.currentProjectId = null;
    window.isEditMode = localStorage.getItem('sz_app_mode') !== 'view';
    
    let projects = JSON.parse(localStorage.getItem('sz_projects_v2') || '[]');
    const saveProjects = () => localStorage.setItem('sz_projects_v2', JSON.stringify(projects));

    // === РЕНДЕР ГЛАВНОГО ЭКРАНА ===
    function renderMain() {
      const grid = document.getElementById('projectsGrid');
      let filtered = window.currentFilter === 'all' ? projects : projects.filter(p => p.category === window.currentFilter);
      
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div style="font-size: 48px; margin-bottom: 16px;">📝</div><div>Нет проектов. Создай первый!</div></div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const finance = calculateProjectFinance(p);
        const financeHtml = finance !== 0 
          ? `<div class="project-finance ${finance > 0 ? 'income' : 'expense'}">${finance > 0 ? '+' : ''}${finance.toLocaleString('ru-RU')} ₽</div>` 
          : '';
        
        const actionsHtml = window.isEditMode 
          ? `<div class="card-actions">
               <button class="action-btn edit" onclick="editProject('${p.id}', event)">✏️</button>
               <button class="action-btn delete" onclick="deleteProject('${p.id}', event)">🗑️</button>
             </div>` 
          : '';

        return `<div class="project-card" onclick="openProject('${p.id}')">
          ${actionsHtml}
          <div>
            <div class="project-title">${p.title}</div>
            <div class="project-meta">${p.subcategory} • ${p.events.length} соб.</div>
          </div>
          ${financeHtml}
        </div>`;
      }).join('');
    }

    function calculateProjectFinance(project) {
      let total = 0;
      project.events.forEach(e => {
        if (e.finance) {
          const val = parseFloat(String(e.finance).replace('+', ''));
          if (!isNaN(val)) total += val;
        }
      });
      return total;
    }

    function filterProjects(cat, btn) {
      window.currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMain();
    }

    // === ЭКРАН ПРОЕКТА ===
    function openProject(id) {
      window.currentProjectId = id;
      const project = projects.find(p => p.id === id);
      if (!project) return;
      
      document.getElementById('projectTitle').textContent = project.title;
      document.getElementById('main-view').style.display = 'none';
      document.getElementById('project-view').style.display = 'block';
      renderTimeline(project);
    }

    function goBack() {
      window.currentProjectId = null;
      document.getElementById('project-view').style.display = 'none';
      document.getElementById('main-view').style.display = 'block';
      renderMain();
    }

    function renderTimeline(project) {
      const timeline = document.getElementById('timeline');
      if (project.events.length === 0) {
        timeline.innerHTML = `<div class="empty-state"><div style="font-size: 48px; margin-bottom: 16px;"></div><div>Пока нет событий</div></div>`;
        return;
      }

      const sortedEvents = [...project.events].sort((a, b) => b.sortDate - a.sortDate);
      
      timeline.innerHTML = sortedEvents.map(e => {
        const mediaHtml = e.media && e.media.length > 0 
          ? `<div class="event-media">${e.media.map(src => `<img src="${src}" onclick="viewImage('${src}')">`).join('')}</div>` : '';
        let financeHtml = '';
        if (e.finance) {
          const cls = e.finance.startsWith('-') ? 'expense' : 'income';
          financeHtml = `<div class="event-finance ${cls}">${e.finance} ₽</div>`;
        }
        const actionsHtml = window.isEditMode 
          ? `<div class="card-actions">
               <button class="action-btn edit" onclick="editEvent('${e.id}', event)">✏️</button>
               <button class="action-btn delete" onclick="deleteEvent('${e.id}', event)">🗑️</button>
             </div>` 
          : '';

        return `<div class="event-card">
          ${actionsHtml}
          <div class="event-date">${e.date}</div>
          <div class="event-title">${e.title}</div>
          <div class="event-desc">${e.desc || ''}</div>
          ${financeHtml}${mediaHtml}
        </div>`;
      }).join('');
    }

    // === ДЕЙСТВИЯ ===
    function handleFabClick() {
      if (!window.isEditMode) return;
      if (window.currentProjectId) {
        openEventModal();
      } else {
        openProjectModal();
      }
    }

    // --- Проект: создание/редактирование ---
    function openProjectModal(project = null) {
      document.getElementById('projectModalTitle').textContent = project ? 'Редактировать проект' : 'Новый проект';
      document.getElementById('projSubmitBtn').textContent = project ? 'Сохранить изменения' : 'Создать проект';
      document.getElementById('projId').value = project ? project.id : '';
      document.getElementById('projTitle').value = project ? project.title : '';
      document.getElementById('projCategory').value = project ? project.category : 'Бизнес';
      document.getElementById('projSubcategory').value = project ? project.subcategory : '';
      document.getElementById('projSummary').value = project ? (project.summary || '') : '';
      openModal('projectModal');
    }

    function editProject(id, event) {
      event.stopPropagation();
      const project = projects.find(p => p.id === id);
      if (project) openProjectModal(project);
    }

    document.getElementById('projectForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('projId').value;
      
      if (id) {
        // Редактирование
        const project = projects.find(p => p.id === id);
        if (project) {
          project.title = document.getElementById('projTitle').value;
          project.category = document.getElementById('projCategory').value;
          project.subcategory = document.getElementById('projSubcategory').value;
          project.summary = document.getElementById('projSummary').value;
        }
      } else {
        // Создание
        const newProject = {
          id: Date.now().toString(),
          title: document.getElementById('projTitle').value,
          category: document.getElementById('projCategory').value,
          subcategory: document.getElementById('projSubcategory').value,
          summary: document.getElementById('projSummary').value,
          events: []
        };
        projects.push(newProject);
      }
      
      saveProjects();
      closeModal('projectModal');
      document.getElementById('projectForm').reset();
      renderMain();
    });

    function deleteProject(id, event) {
      event.stopPropagation();
      if (!confirm('Удалить проект и все его события?')) return;
      projects = projects.filter(p => p.id !== id);
      saveProjects();
      renderMain();
    }

    // --- Событие: создание/редактирование ---
    function openEventModal(eventData = null) {
      document.getElementById('eventModalTitle').textContent = eventData ? 'Редактировать событие' : 'Новое событие';
      document.getElementById('eventSubmitBtn').textContent = eventData ? 'Сохранить изменения' : 'Сохранить событие';
      document.getElementById('eventId').value = eventData ? eventData.id : '';
      
      if (eventData) {
        // Парсим дату обратно в формат datetime-local
        const dateStr = eventData.date; // "12 июня • 08:00"
        // Для редактирования просто подставим текущую дату, если парсинг сложный
        document.getElementById('eventDate').value = new Date(eventData.sortDate).toISOString().slice(0, 16);
        document.getElementById('eventTitle').value = eventData.title;
        document.getElementById('eventDesc').value = eventData.desc || '';
        
        // Финансы
        if (eventData.finance) {
          if (eventData.finance.startsWith('-')) {
            setFinanceType('expense');
            document.getElementById('financeInput').value = Math.abs(parseFloat(eventData.finance));
          } else {
            setFinanceType('income');
            document.getElementById('financeInput').value = eventData.finance.replace('+', '');
          }
        } else {
          setFinanceType('skip');
        }
        
        // Медиа
        window.tempMedia = eventData.media || [];
        document.getElementById('mediaPreview').innerHTML = window.tempMedia.map(s => `<img src="${s}">`).join('');
      } else {
        document.getElementById('eventDate').value = new Date().toISOString().slice(0, 16);
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDesc').value = '';
        document.getElementById('financeInput').value = '';
        setFinanceType('income');
        window.tempMedia = [];
        document.getElementById('mediaPreview').innerHTML = '';
      }
      
      openModal('eventModal');
    }

    function editEvent(eventId, event) {
      event.stopPropagation();
      const project = projects.find(p => p.id === window.currentProjectId);
      const eventData = project.events.find(e => e.id === eventId);
      if (eventData) openEventModal(eventData);
    }

    document.getElementById('eventForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const project = projects.find(p => p.id === window.currentProjectId);
      if (!project) return;

      const id = document.getElementById('eventId').value;
      const dateVal = document.getElementById('eventDate').value;
      const finType = document.getElementById('financeType').value;
      let finVal = document.getElementById('financeInput').value;

      if (finType === 'expense' && finVal) finVal = '-' + Math.abs(parseFloat(finVal));
      else if (finType === 'income' && finVal) finVal = '+' + Math.abs(parseFloat(finVal));
      else if (finType === 'skip') finVal = '';

      const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
      const d = new Date(dateVal);
      const dateStr = `${d.getDate()} ${months[d.getMonth()]} • ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

      const eventData = {
        id: id || Date.now().toString(),
        date: dateStr,
        title: document.getElementById('eventTitle').value,
        desc: document.getElementById('eventDesc').value,
        finance: finVal,
        sortDate: d.getTime(),
        media: window.tempMedia || []
      };

      if (id) {
        // Редактирование
        const idx = project.events.findIndex(e => e.id === id);
        if (idx !== -1) project.events[idx] = eventData;
      } else {
        // Создание
        project.events.push(eventData);
      }

      saveProjects();
      closeModal('eventModal');
      document.getElementById('eventForm').reset();
      document.getElementById('mediaPreview').innerHTML = '';
      window.tempMedia = [];
      renderTimeline(project);
    });

    function deleteEvent(eventId, event) {
      event.stopPropagation();
      if (!confirm('Удалить это событие?')) return;
      const project = projects.find(p => p.id === window.currentProjectId);
      project.events = project.events.filter(e => e.id !== eventId);
      saveProjects();
      renderTimeline(project);
    }

    // === UI HELPERS ===
    function toggleEditMode() {
      window.isEditMode = !window.isEditMode;
      localStorage.setItem('sz_app_mode', window.isEditMode ? 'edit' : 'view');
      updateAppMode();
    }

    function updateAppMode() {
      const btn = document.getElementById('modeToggle');
      const fab = document.getElementById('fabBtn');
      if (window.isEditMode) {
        btn.textContent = '✏️ Ред.'; btn.classList.remove('view-mode'); fab.classList.remove('hidden');
      } else {
        btn.textContent = '🔒 Просм.'; btn.classList.add('view-mode'); fab.classList.add('hidden');
      }
      if (window.currentProjectId) {
        const p = projects.find(pr => pr.id === window.currentProjectId);
        if(p) renderTimeline(p);
      } else {
        renderMain();
      }
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    
    function setFinanceType(type) {
      document.getElementById('financeType').value = type;
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-type="${type}"]`).classList.add('active');
      const input = document.getElementById('financeInput');
      input.className = type;
      if (type === 'skip') { input.disabled = true; input.value = ''; } 
      else { input.disabled = false; }
    }

    document.getElementById('mediaInput').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      const arr = [];
      for (const f of files) {
        arr.push(await new Promise(res => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.readAsDataURL(f);
        }));
      }
      window.tempMedia = arr;
      document.getElementById('mediaPreview').innerHTML = arr.map(s => `<img src="${s}">`).join('');
    });

    function viewImage(src) {
      const o = document.createElement('div');
      o.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:300;cursor:pointer;';
      const i = new Image(); i.src = src; i.style.cssText = 'max-width:100%;max-height:100%;';
      o.appendChild(i); o.onclick = () => o.remove();
      document.body.appendChild(o);
    }

    function openSettings() { openModal('settingsModal'); }
    
    function exportData() {
      const blob = new Blob([JSON.stringify(projects, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `sz_projects_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            projects = data;
            saveProjects();
            closeModal('settingsModal');
            renderMain();
            alert('✅ Импорт успешен!');
          } else { alert('❌ Неверный формат.'); }
        } catch (err) { alert('❌ Ошибка файла.'); }
      };
      reader.readAsText(file);
    }

    function clearData() {
      if (confirm('️ Удалить ВСЕ проекты и события?')) {
        projects = [];
        saveProjects();
        closeModal('settingsModal');
        renderMain();
      }
    }

    document.querySelectorAll('.modal').forEach(m => {
      m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); });
    });

    updateAppMode();
    renderMain();
  </script>
</body>
</html>
