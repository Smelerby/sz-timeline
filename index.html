<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>СЖ Хронология</title>
    <style>
        /* === БАЗОВЫЕ НАСТРОЙКИ (MOBILE FIRST) === */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e1e2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* === ШАПКА === */
        .app-header {
            position: sticky; top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-bottom: 1px solid rgba(167, 243, 208, 0.1);
            z-index: 100;
        }
        .header-title { font-size: 18px; font-weight: 600; color: #a7f3d0; }
        .header-subtitle { font-size: 13px; color: #94a3b8; margin-top: 4px; }

        /* === КАРТОЧКА СТАТУСА === */
        .status-card {
            margin: 20px; padding: 16px;
            background: rgba(30, 30, 46, 0.8);
            border: 1px solid rgba(167, 243, 208, 0.15);
            border-radius: 16px;
        }
        .status-title { font-size: 14px; color: #c4b5fd; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .status-item { background: rgba(15, 23, 42, 0.6); padding: 12px; border-radius: 12px; }
        .status-label { font-size: 11px; color: #64748b; margin-bottom: 6px; }
        .status-value { font-size: 16px; font-weight: 700; color: #e2e8f0; }
        .status-value.profit { color: #a7f3d0; }
        .status-value.missed { color: #fdba74; }

        /* === ЛЕНТА ВРЕМЕНИ === */
        .timeline { padding: 0 20px; position: relative; }
        .timeline::before {
            content: ''; position: absolute; left: 32px; top: 10px; bottom: 10px;
            width: 2px; background: linear-gradient(180deg, #a7f3d0 0%, #c4b5fd 100%); opacity: 0.2;
        }
        .event-card {
            position: relative; margin-bottom: 16px; padding: 16px; padding-left: 40px;
            background: rgba(30, 30, 46, 0.6); border-radius: 14px;
            border: 1px solid rgba(167, 243, 208, 0.05); transition: all 0.2s ease;
        }
        .event-card:active { transform: scale(0.98); background: rgba(30, 30, 46, 0.9); }
        .event-dot {
            position: absolute; left: 26px; top: 22px; width: 14px; height: 14px;
            border-radius: 50%; background: #0f172a; border: 3px solid #a7f3d0; z-index: 2;
        }
        .event-date { font-size: 12px; color: #94a3b8; font-weight: 500; margin-bottom: 6px; }
        .event-title { font-size: 16px; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; line-height: 1.3; }
        .event-preview { font-size: 14px; color: #64748b; line-height: 1.5; }
        .event-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; }
        .tag.income { background: rgba(167, 243, 208, 0.1); color: #a7f3d0; }
        .tag.expense { background: rgba(248, 113, 113, 0.1); color: #f87171; }
        .tag.media { background: rgba(196, 181, 253, 0.1); color: #c4b5fd; }

        /* === ПЛАВАЮЩАЯ КНОПКА (FAB) === */
        .fab {
            position: fixed; bottom: 24px; right: 24px; width: 64px; height: 64px;
            border-radius: 50%; background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%);
            color: #0f172a; border: none; font-size: 32px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4); cursor: pointer; z-index: 1000;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }

        /* === МОДАЛЬНОЕ ОКНО (НИЖНЯЯ ШТОРКА) === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); z-index: 2000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1e1e2e; border-radius: 24px 24px 0 0;
            padding: 24px 20px 40px; z-index: 2001;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-sheet.active { transform: translateY(0); }

        .modal-handle {
            width: 40px; height: 4px; background: #475569; border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal-title { font-size: 18px; font-weight: 600; color: #a7f3d0; margin-bottom: 20px; text-align: center; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
        .form-input {
            width: 100%; padding: 16px; background: #0f172a; color: #e2e8f0;
            border: 1px solid rgba(167, 243, 208, 0.2); border-radius: 12px;
            font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #a7f3d0; }
        textarea.form-input { resize: none; min-height: 80px; }

        .btn-save {
            width: 100%; padding: 16px; margin-top: 10px;
            background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%);
            color: #0f172a; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .btn-save:active { transform: scale(0.98); }

        /* === АДАПТИВ ПОД ПЛАНШЕТ/ПК === */
        @media (min-width: 768px) {
            body { padding-bottom: 20px; }
            .timeline { max-width: 600px; margin: 0 auto; }
            .status-card { max-width: 600px; margin: 20px auto; }
            .fab { bottom: 40px; right: 40px; }
            .modal-sheet { max-width: 500px; left: 50%; transform: translate(-50%, 100%); border-radius: 24px; margin-bottom: 20px; }
            .modal-sheet.active { transform: translate(-50%, 0); }
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header class="app-header">
        <div class="header-title">📅 День защиты детей</div>
        <div class="header-subtitle">Малояз • 1 июня 2026</div>
    </header>

    <!-- Карточка статуса -->
    <div class="status-card">
        <div class="status-title">📊 Итоги и статус</div>
        <div class="status-grid">
            <div class="status-item">
                <div class="status-label">Прибыль</div>
                <div class="status-value profit" id="total-profit">0 ₽</div>
            </div>
            <div class="status-item">
                <div class="status-label">Упущено</div>
                <div class="status-value missed">Упаковка</div>
            </div>
        </div>
    </div>

    <!-- Лента времени -->
    <div class="timeline" id="timeline-container">
        <!-- События будут добавляться сюда через JS -->
    </div>

    <!-- Плавающая кнопка -->
    <button class="fab" id="fab-btn">+</button>

    <!-- Модальное окно (Форма) -->
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-sheet" id="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Новое событие</div>
        
        <div class="form-group">
            <label class="form-label">Дата и время</label>
            <input type="text" class="form-input" id="input-date" placeholder="Например: 1 июня • 12:00">
        </div>
        <div class="form-group">
            <label class="form-label">Заголовок</label>
            <input type="text" class="form-input" id="input-title" placeholder="Коротко о событии">
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea class="form-input" id="input-desc" placeholder="Детали, мысли, итоги..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Сумма (если есть, со знаком + или -)</label>
            <input type="text" class="form-input" id="input-finance" placeholder="Например: +5000 или -1200">
        </div>

        <button class="btn-save" id="btn-save">Сохранить в память</button>
    </div>

    <script>
        // === ДАННЫЕ ===
        // Стартовые данные (если в памяти пусто)
        const defaultEvents = [
            { date: "15 мая • 14:00", title: "Встреча с Алмазом", desc: "Рождение идеи, обсуждение гипотез", finance: "" },
            { date: "30 мая • 18:30", title: "Закуп в Дёме", desc: "Финальная подготовка, проверка оборудования", finance: "-2150" },
            { date: "1 июня • 12:00", title: "Пик продаж", desc: "Два часа непрерывной работы, ~150 порций", finance: "+18800" }
        ];

        // Загрузка из LocalStorage или использование стартовых
        let events = JSON.parse(localStorage.getItem('sz_timeline_events')) || defaultEvents;

        // === ЭЛЕМЕНТЫ DOM ===
        const timelineContainer = document.getElementById('timeline-container');
        const fabBtn = document.getElementById('fab-btn');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalSheet = document.getElementById('modal-sheet');
        const btnSave = document.getElementById('btn-save');
        const totalProfitEl = document.getElementById('total-profit');

        // === ФУНКЦИИ ===
        function renderEvents() {
            timelineContainer.innerHTML = '';
            let profit = 0;

            events.forEach(event => {
                // Считаем прибыль
                if (event.finance) {
                    profit += parseInt(event.finance.replace(/\D/g, '')) * (event.finance.startsWith('-') ? -1 : 1);
                }

                // Создаем карточку
                const card = document.createElement('div');
                card.className = 'event-card';
                
                let tagsHtml = '';
                if (event.finance) {
                    const isIncome = event.finance.startsWith('+');
                    tagsHtml += `<span class="tag ${isIncome ? 'income' : 'expense'}">${event.finance} ₽</span>`;
                }

                card.innerHTML = `
                    <div class="event-dot"></div>
                    <div class="event-date">${event.date}</div>
                    <div class="event-title">${event.title}</div>
                    <div class="event-preview">${event.desc}</div>
                    ${tagsHtml ? `<div class="event-tags">${tagsHtml}</div>` : ''}
                `;
                timelineContainer.appendChild(card);
            });

            // Обновляем сводку
            totalProfitEl.textContent = profit.toLocaleString('ru-RU') + ' ₽';
        }

        function openModal() {
            modalOverlay.classList.add('active');
            modalSheet.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            modalSheet.classList.remove('active');
            // Очистка формы
            document.getElementById('input-date').value = '';
            document.getElementById('input-title').value = '';
            document.getElementById('input-desc').value = '';
            document.getElementById('input-finance').value = '';
        }

        function saveEvent() {
            const date = document.getElementById('input-date').value.trim();
            const title = document.getElementById('input-title').value.trim();
            const desc = document.getElementById('input-desc').value.trim();
            const finance = document.getElementById('input-finance').value.trim();

            if (!date || !title) {
                alert('Пожалуйста, заполни дату и заголовок!');
                return;
            }

            const newEvent = { date, title, desc, finance };
            events.push(newEvent);
            
            // Сохраняем в память телефона
            localStorage.setItem('sz_timeline_events', JSON.stringify(events));
            
            renderEvents();
            closeModal();
        }

        // === СОБЫТИЯ ===
        fabBtn.addEventListener('click', openModal);
        modalOverlay.addEventListener('click', closeModal);
        btnSave.addEventListener('click', saveEvent);

        // Первичная отрисовка
        renderEvents();
    </script>
</body>
</html>
